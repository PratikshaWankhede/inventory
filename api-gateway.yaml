apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: inventory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: 941377142074.dkr.ecr.ap-south-1.amazonaws.com/api-gateway:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: inventory
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - port: 5000
    nodePort: 30007
