name: Build, Push and Deploy to EC2

on:
  push:
    branches: [ main, deploy ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      OWNER: ${{ github.repository_owner }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v4
        with:
          context: ./server/auth-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/auth-service:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.OWNER }}/auth-service:latest

      - name: Build and push product-service
        uses: docker/build-push-action@v4
        with:
          context: ./server/product-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/product-service:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.OWNER }}/product-service:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v4
        with:
          context: ./server/api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/api-gateway:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.OWNER }}/api-gateway:latest

      - name: Build and push client
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/client:${{ env.IMAGE_TAG }},${{ env.REGISTRY }}/${{ env.OWNER }}/client:latest

      - name: Create docker-compose for deploy
        run: |
          cat > docker-compose.deploy.yml <<EOF
version: '3.8'
services:
  api-gateway:
    image: ${{ env.REGISTRY }}/${{ env.OWNER }}/api-gateway:${{ env.IMAGE_TAG }}
    ports:
      - "3000:3000"

  auth-service:
    image: ${{ env.REGISTRY }}/${{ env.OWNER }}/auth-service:${{ env.IMAGE_TAG }}
    ports:
      - "4000:4000"

  product-service:
    image: ${{ env.REGISTRY }}/${{ env.OWNER }}/product-service:${{ env.IMAGE_TAG }}
    ports:
      - "5000:5000"

  client:
    image: ${{ env.REGISTRY }}/${{ env.OWNER }}/client:${{ env.IMAGE_TAG }}
    ports:
      - "80:80"

EOF

      - name: Copy compose to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          source: docker-compose.deploy.yml
          target: ${{ secrets.REMOTE_DIR }}

      - name: SSH and run deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            set -euo pipefail
            cd ${{ secrets.REMOTE_DIR }}
            echo "Logging in to container registry"
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin || true
            echo "Pulling images and starting services"
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose -f docker-compose.deploy.yml pull
              docker-compose -f docker-compose.deploy.yml up -d
            else
              docker compose -f docker-compose.deploy.yml pull
              docker compose -f docker-compose.deploy.yml up -d
            fi
