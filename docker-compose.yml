version: "3.8"

services:

  api-gateway:
    build: ./server/api-gateway
    container_name: api-gateway
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      AUTH_SERVICE_URL: http://auth-service:5001
      PRODUCT_SERVICE_URL: http://product-service:5002
      JWT_SECRET: mysecretkey
    depends_on:
      - auth-service
      - product-service
    networks:
      - inventory-net

  auth-service:
    build: ./server/auth-service
    container_name: auth-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/inventory
      JWT_SECRET: mysecretkey
    depends_on:
      - mongo    
    networks:
      - inventory-net

  product-service:
    build: ./server/product-service
    container_name: product-service
    ports:
      - "5002:5002"
    networks:
      - inventory-net

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - inventory-net     

  frontend:
    build: ./client
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - inventory-net

networks:
  inventory-net:

volumes:
  mongo-data:    
