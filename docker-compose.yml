version: '3.8'
services:
  api-gateway:
    build: ./server/api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  auth-service:
    build: ./server/auth-service
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production

  product-service:
    build: ./server/product-service
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production

  client:
    build: ./client
    ports:
      - "80:80"

networks:
  default:
    driver: bridge
